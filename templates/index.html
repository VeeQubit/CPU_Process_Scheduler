<!DOCTYPE html>
<html>
<head>
  <title>CPU Scheduling Simulator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <h1 class="main-title">CPU SCHEDULING SIMULATOR</h1>

  <div class="card">

    <div class="process-layout">

      <!-- LEFT SIDE: Process Cards -->
      <div class="left-panel">
        <h3>Processes</h3>
        <p class="muted">Add a process to simulate it</p>

        <div id="processList" class="process-grid"></div>

        <div class="btn-row">
  <button class="add-btn" onclick="openModal()">
    <span class="btn-icon">
      <svg viewBox="0 0 24 24" width="16" height="16">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>
    Add Process
  </button>

  <button class="danger" onclick="clearProcesses()">
    <span class="btn-icon">
      <svg viewBox="0 0 24 24" width="16" height="16">
        <path d="M3 6h18M8 6v-2h8v2M6 6l1 14h10l1-14"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>
      </svg>
    </span>
    Clear All
  </button>
</div>
      </div>

      <!-- RIGHT SIDE: Process Table -->
      <div class="right-panel">
        <h3>Process Table</h3>

        <table class="result-table" id="processTable">
          <tr>
            <th>PID</th>
            <th>Arrival</th>
            <th>Burst</th>
            <th>Priority</th>
          </tr>
        </table>
      </div>

    </div>

    <!-- Bottom Controls -->
    <div class="row">
      <label>Quantum (RR)</label>
      <input type="number" id="quantum" value="2" min="1">
     <button id="runBtn" class="run-btn" onclick="runScheduler()">
  <span class="btn-icon">
    <svg viewBox="0 0 24 24" width="16" height="16">
      <path d="M8 5l12 7-12 7V5z" fill="currentColor"/>
    </svg>
  </span>
  Run Scheduler
</button>
    </div>
  </div>

<!-- RESULTS SECTION (HIDDEN INITIALLY) -->
<div id="resultsSection" class="hidden">

  <h2 id="resultsHeading">Results Summary</h2>
  <div id="summaryTable" class="card"></div>

 <div id="algorithmsBlock" class="algo-hidden">

  <h2 id="algorithmsHeading">Algorithms</h2>

  <div id="algoButtons" class="algo-bar"></div>

  <div id="details" class="card"></div>

</div>

</div>
  <!-- Modal -->
<div id="processModal" class="modal hidden">

  <div class="modal-content split-modal">

    <!-- LEFT PANEL -->
    <div class="modal-left">
      <div class="modal-brand">
        <h2>CPU Scheduler</h2>
        <p>
          Simulate scheduling algorithms
          and compare performance.
        </p>
      </div>

      <div class="modal-big-text">
        Plan.<br>
        Simulate.<br>
        Analyze.
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="modal-right">

      <h3>Add Process</h3>

      <form id="processForm" autocomplete="off">

      <div class="modal-grid">
        <div>
          <label>Arrival Time</label>
          <input type="number" id="mArrival" min="0">
        </div>

        <div>
          <label>Burst Time</label>
          <input type="number" id="mBurst" min="1">
        </div>

        <div style="grid-column:1 / -1;">
          <label>Priority</label>
          <input type="number" id="mPriority" min="1">
        </div>

      </div>

      <div id="modalError" class="modal-error hidden"></div>

     <div class="modal-actions">

  <div class="color-picker-wrap">
    <div id="colorPreview" class="color-preview">
      <input type="color" id="mColor" value="#3b82f6" aria-label="Pick color">
    </div>
  </div>

  <button type="button" class="primary" onclick="addProcess()">Submit</button>
  <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>

</div>
       </form>
    </div>

  </div>

</div>
  

  <script src="/static/script.js"></script>
</body>
</html>
